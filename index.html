<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in to your account</title>
  <link rel="icon" type="image/png" href="microsoft-logo.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg"></div>

  <div class="page-wrapper">

    <div class="login-box">

      <div class="logo-area">
        <img src="mmu-logo.jpeg" alt="MMU Logo" class="uni-logo" />
      </div>

      <h1>Sign in</h1>

      <!-- Step 1: Email -->
      <div id="step-email">
        <div class="input-group">
          <input type="email" id="email" placeholder="Email, phone, or Skype" autocomplete="off" />
        </div>

        <div class="links-area">
          <a href="#">Can't access your account?</a>
        </div>

        <div class="button-row">
          <button class="btn btn-back" onclick="history.back()">Back</button>
          <button class="btn btn-login" onclick="goToPassword()">Next</button>
        </div>
      </div>

      <!-- Step 2: Password (hidden initially) -->
      <div id="step-password" style="display:none;">
        <p class="email-display" id="email-display"></p>

        <div class="input-group">
          <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
        </div>

        <div class="show-pw-row">
          <input type="checkbox" id="showPw" onchange="
            document.getElementById('password').type = this.checked ? 'text' : 'password'
          " />
          <label for="showPw">Show password</label>
        </div>

        <div class="links-area">
          <a href="#">Forgot my password</a>
        </div>

        <div class="button-row">
          <button class="btn btn-back" onclick="goBack()">Back</button>
          <button class="btn btn-login" onclick="signIn()">Sign in</button>
        </div>
      </div>

    </div>

    <!-- IT Hotline Info Box -->
    <div class="info-box">
      <p>IT Hotline No : 03-8312 5777 (C) | 06-252 4777 (M)</p>
      <p>Email : nice.support@mmu.edu.my</p>
    </div>

    <!-- Sign-in options -->
    <div class="options-box">
      <button class="options-btn">
        <svg class="options-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8.5" cy="15.5" r="4.5" stroke="#1b1b1b" stroke-width="1.5"/>
          <line x1="12" y1="12" x2="20" y2="4" stroke="#1b1b1b" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="18" y1="6" x2="20" y2="8" stroke="#1b1b1b" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="16" y1="4" x2="16" y2="7" stroke="#1b1b1b" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Sign-in options
      </button>
    </div>

  </div>

  <div class="footer">
    <a href="#">Terms of use</a>
    <a href="#">Privacy &amp; cookies</a>
    <span class="dots">···</span>
  </div>

  <script src="script.js"></script>

</body>
</html>
